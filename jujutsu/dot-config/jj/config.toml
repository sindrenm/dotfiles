"$schema" = "https://jj-vcs.github.io/jj/latest/config-schema.json"

[user]
name = "Sindre Moen"

[ui]
default-command = "log"
diff-formatter = ":git"
editor = "nvim"
pager = ["hunk", "pager"]

[signing]
backend = "ssh"
behavior = "own"

[aliases]
retrunk = ["rebase", "-d", "trunk()"]

[remotes.origin]
auto-track-bookmarks = "glob:*"

[git]
private-commits = "description(glob:'private! *')"
