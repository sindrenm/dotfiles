# —— Status bar customization
# ——————————————————————————————————————————————————————————————————————————————

# Have a completely transparent status bar
set -g status-bg default

# Increase the possible length of the left part of the status bar
set -g status-left-length 100

# Display session name in bold white
set -g status-left-attr bold
set -g status-left-fg white
set -g status-left "Session: #S"

# Display the date and time in bold yellow. Example: 15.01.2010 » 13:37
set -g status-right-attr bold
set -g status-right-fg yellow
set -g status-right "%d.%m.%Y » %H:%M:%S"

# Update the date and time every second
set -g status-interval 1

# Center the window list on the screen
set -g status-justify centre

# Set inactive window colors
set-window-option -g window-status-bg default
set-window-option -g window-status-fg white
set-window-option -g window-status-attr dim

# Set active window colors
set-window-option -g window-status-current-bg default
set-window-option -g window-status-current-fg yellow
set-window-option -g window-status-current-attr bold
